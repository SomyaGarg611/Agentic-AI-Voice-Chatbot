version: "3.9"
services:
  voicebot:
    build: ..
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../chroma_db:/app/chroma_db
      - ../memory.db:/app/memory.db

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - voicebot

volumes:
  caddy_data:
  caddy_config:
